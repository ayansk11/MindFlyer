<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="mindflyerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="90" cy="90" r="85" fill="url(#mindflyerGradient)" />
  
  <!-- Brain/mind wave icon -->
  <g transform="translate(90, 90)">
    <!-- Left brain hemisphere -->
    <path d="M -20 -15 Q -30 -10 -30 0 Q -30 15 -20 20" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Right brain hemisphere -->
    <path d="M 20 -15 Q 30 -10 30 0 Q 30 15 20 20" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Center connection -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="2"/>
    
    <!-- Top wave -->
    <path d="M -25 -10 Q -15 -20 0 -18 Q 15 -16 25 -10" 
          stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Bottom wave -->
    <path d="M -25 10 Q -15 20 0 18 Q 15 16 25 10" 
          stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>
</svg>